<!DOCTYPE html>
<html>
<head>
  <title>Idle Empire</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🌾 Idle Empire</h1>

  <p>💰 Монеты: <span id="coins">0</span></p>
  <p>📈 Доход: <span id="income">1</span> / сек</p>
  <p>⭐ Уровень: <span id="level">1</span></p>

  <button onclick="addCoins()">💰 Получить</button>
  <button onclick="upgrade()">⬆️ Улучшить ферму (10 монет)</button>

  <h2>🏪 Магазин</h2>

  <button onclick="buyHouse()">🏡 Дом фермы (50 монет) +5 дохода</button>
  <button onclick="buyFactory()">🏭 Фабрика (200 монет) +20 дохода</button>

</div>

<script src="script.js"></script>

</body>
</html>
